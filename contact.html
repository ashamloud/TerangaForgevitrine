<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Agence | TerangaForge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        surface: '#FFFFFF',
                        surfaceAlt: '#F8FAFC',
                        accent: '#8B5CF6',
                        accentGlow: '#D946EF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;800;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #8B5CF6, #D946EF);
        }
        .ai-button {
            position: relative;
            background: linear-gradient(90deg, #8B5CF6, #D946EF);
            z-index: 1;
            overflow: hidden;
        }
        .ai-glow {
            box-shadow: 0 0 30px -5px rgba(217, 70, 239, 0.4);
        }
    </style>
</head>
<body class="antialiased font-sans text-gray-600 bg-surfaceAlt overflow-x-hidden selection:bg-accent selection:text-white">

    <nav class="fixed w-full z-50 transition-all duration-300 py-4 glass-nav top-0 shadow-sm">
        <div class="container mx-auto px-6 lg:px-12 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accentGlow flex items-center justify-center shadow-lg ai-glow">
                    <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-outfit font-black text-2xl tracking-tight text-primary">
                    Teranga<span class="text-gradient">Forge</span>
                </span>
            </a>
            <div class="hidden md:flex items-center space-x-10 text-sm font-semibold tracking-wide">
                <a href="index.html#services" class="text-gray-600 hover:text-accent transition-all">Nos Services</a>
                <a href="contact.html" class="text-accent transition-all">Contact</a>
            </div>
            <div class="hidden md:flex items-center gap-4">
                <button class="ai-button text-white px-7 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all ai-glow hover:-translate-y-0.5">
                    Connexion
                </button>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 bg-primary text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-accent/10 to-accentGlow/10 pointer-events-none"></div>
        <div class="container mx-auto px-6 relative z-10">
            <h1 class="font-outfit text-4xl md:text-5xl font-black text-white mb-6">Contacter l'Atelier</h1>
            <p class="text-gray-400 font-medium max-w-xl mx-auto">Un problème avec une génération IA ? Une demande de PME pour une charte graphique complexe ? Les forgerons de BOKK vous écoutent.</p>
        </div>
    </section>

    <section class="py-20 -mt-10 relative z-20">
        <div class="container mx-auto px-6 max-w-4xl">
            <div class="bg-white rounded-[2rem] p-8 md:p-12 border border-gray-100 shadow-xl shadow-gray-200/30">
                
                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Nom Complet</label>
                            <input type="text" class="w-full px-5 py-4 rounded-xl bg-surfaceAlt border border-gray-100 focus:outline-none focus:border-accent focus:bg-white transition-all font-medium text-primary" placeholder="Jean Dupont">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Email de contact</label>
                            <input type="email" class="w-full px-5 py-4 rounded-xl bg-surfaceAlt border border-gray-100 focus:outline-none focus:border-accent focus:bg-white transition-all font-medium text-primary" placeholder="jean@entreprise.sn">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Type de requête</label>
                        <select class="w-full px-5 py-4 rounded-xl bg-surfaceAlt border border-gray-100 focus:outline-none focus:border-accent focus:bg-white transition-all font-medium text-primary appearance-none">
                            <option>Assistance : Mon CV PDF ne se télécharge pas</option>
                            <option>Projet : Création de marque (Logo + Site vitrine)</option>
                            <option>Projet : Présentation PowerPoint Investisseur</option>
                            <option>Partenariat ou Autre</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Précisions</label>
                        <textarea rows="5" placeholder="Détaillez votre projet ou votre problème..." class="w-full px-5 py-4 rounded-xl bg-surfaceAlt border border-gray-100 focus:outline-none focus:border-accent focus:bg-white transition-all font-medium text-primary"></textarea>
                    </div>

                    <button type="submit" class="w-full py-4 ai-button text-white rounded-xl font-bold text-sm shadow-md hover:-translate-y-1 transition-transform flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> Envoyer à l'Atelier
                    </button>
                </form>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-gray-200 bg-surfaceAlt pt-10 pb-8 mt-10">
        <div class="container mx-auto px-6 lg:px-12 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 font-medium">
            <p>&copy; 2026 Écosystème BOKK. Tous droits réservés.</p>
        </div>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
